<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>東京夏物語｜路線地圖</title>
<link rel="stylesheet" href="style.css">
<script>(function(){var t;try{t=localStorage.getItem("tokyo-theme")}catch(e){}document.documentElement.dataset.theme=t==="light"?"light":"dark";})();</script>
</head>
<body>
<nav class="daynav" aria-label="頁面導覽">
  <div class="wrap"><a href="index.html" class="pagelink">🗓 行程</a><a href="map.html" class="pagelink now">🗺 地圖</a><a href="budget.html" class="pagelink">💴 預算</a><a href="ledger.html" class="pagelink">🧾 記帳</a><a href="apps.html" class="pagelink">📱 App</a><a href="tips.html" class="pagelink">💡 提醒</a><button type="button" id="themeBtn" class="thbtn" aria-label="切換深淺色主題">☀️ 淺色</button></div>
</nav>

<main class="wrap">

<section id="map">
  <p class="kicker">Route Map</p>
  <h2 class="serif">六日路線總覽圖<span class="jp">ちず</span></h2>
  <p class="daymeta"><span>以千束 Airbnb（★）為中心，每色一天，點景點看說明、右上角圖層可切換各日。實際導航請點各日的 Google Maps 連結。</span></p>
  <figure class="mapbox">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <div id="leafmap" role="img" aria-label="六日行程真實路線地圖"></div>
    <div class="map-legend">
      <span><i style="background:#b73a2c"></i>7/31 淺草在地日</span>
      <span><i style="background:#b98a2f"></i>8/1 阿美橫＋花火</span>
      <span><i style="background:#2b4a7a"></i>8/2 神宮・澀谷</span>
      <span><i style="background:#4a7a5a"></i>8/3 築地・銀座</span>
    </div>
    <figcaption>底圖 © OpenStreetMap。彩線為當日順路連線（非實際軌道路徑），所有單段車程均 ≤ 60 分。</figcaption>
  </figure>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
  (function(){
    if(typeof L === 'undefined'){ return; }
    var HOME = [35.7206, 139.7903]; // 千束 2-22-6
    var P = {
      sensoji:   {ll:[35.7148,139.7967], n:'淺草寺・仲見世', d:'7/31 08:00'},
      kappabashi:{ll:[35.7141,139.7887], n:'合羽橋道具街', d:'7/31 11:15'},
      kanko:     {ll:[35.7108,139.7963], n:'新仲見世商店街・EKIMISE 周邊', d:'7/31 15:30 逛街'},
      azumabashi:{ll:[35.7096,139.7997], n:'吾妻橋・隅田公園', d:'7/31 18:00 黃昏、18:45 壽喜燒'},
      ameyoko:   {ll:[35.7106,139.7746], n:'阿美橫町', d:'8/1 10:45 午餐＋掃貨'},
      hanabi:    {ll:[35.7093,139.9060], n:'🎆 江戶川花火會場（篠崎）', d:'8/1 19:15–20:20'},
      meiji:     {ll:[35.6764,139.6993], n:'明治神宮', d:'8/2 09:15'},
      takeshita: {ll:[35.6716,139.7031], n:'竹下通・表參道', d:'8/2 11:00'},
      shibuya:   {ll:[35.6590,139.7025], n:'澀谷 百貨逛街', d:'8/2 14:45 到晚餐'},
      tsukiji:   {ll:[35.6654,139.7707], n:'築地場外市場・築地本願寺', d:'8/3 09:00 海鮮早午餐'},
      ginza:     {ll:[35.6696,139.7639], n:'銀座百貨', d:'8/3 14:15 午後慢逛'}
    };
    var DAYS = [
      {name:'7/31 淺草在地日', color:'#b73a2c', route:['sensoji','kappabashi','kanko','azumabashi']},
      {name:'8/1 阿美橫＋花火', color:'#b98a2f', route:['ameyoko','HOME','hanabi']},
      {name:'8/2 神宮・澀谷',   color:'#2b4a7a', route:['meiji','takeshita','shibuya']},
      {name:'8/3 築地・銀座',   color:'#4a7a5a', route:['tsukiji','ginza']}
    ];
    var map = L.map('leafmap', {scrollWheelZoom:false});
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom:18, attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);
    L.marker(HOME, {icon:L.divIcon({className:'', html:'<span class="home-pin">★</span>', iconSize:[26,26], iconAnchor:[13,15]}), zIndexOffset:1000})
      .addTo(map).bindPopup('<b>千束 Airbnb（基地）</b>台東區千束 2-22-6<br>入谷駅 8 分・TX 淺草 10 分');
    var overlays = {}, allPts = [HOME];
    DAYS.forEach(function(day){
      var pts = [HOME].concat(day.route.map(function(k){ return k==='HOME' ? HOME : P[k].ll; })).concat([HOME]);
      var g = L.layerGroup();
      L.polyline(pts, {color:day.color, weight:3.5, opacity:.85, dashArray:'7 7'}).addTo(g);
      day.route.forEach(function(k){
        if(k==='HOME') return;
        var s = P[k];
        allPts.push(s.ll);
        L.circleMarker(s.ll, {radius:7, color:'#fff', weight:2, fillColor:day.color, fillOpacity:1})
          .addTo(g).bindPopup('<b>'+s.n+'</b>'+s.d);
      });
      g.addTo(map);
      overlays['<i style="display:inline-block;width:14px;height:4px;border-radius:2px;vertical-align:middle;background:'+day.color+'"></i> '+day.name] = g;
    });
    L.control.layers(null, overlays, {collapsed:true, position:'topright'}).addTo(map);
    map.fitBounds(L.latLngBounds(allPts), {padding:[36,36]});
  })();
  </script>
</section>

</main>

<footer>
  <div class="wrap">
    <p class="serif" style="font-size:15px; color:var(--ink)">東京夏物語 ・ 2026.7.30–8.4 ・ 三人旅</p>
    <p>航班時刻以長榮航空最終確認為準；花火大會、展望台開放資訊以主辦方官網當日公告為準。</p>
    <p>行程與交通時間由你的資深導遊規劃：所有單段移動 ≤ 60 分鐘（含花火會場 55 分）。楽しんでね！🏮</p>
  </div>
</footer>

<script src="theme.js"></script>
</body>
</html>
